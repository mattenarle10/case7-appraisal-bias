<!-- SLIDE 5 — LIVE POLL -->
<section class="slide" data-slide-title="Live Poll">
    <div class="slide-number reveal">LIVE POLL</div>
    <div class="breadcrumb reveal">
        <span class="active">CASE</span>
        <span>ANALYSIS</span>
        <span>SOLUTION</span>
        <span>REFS</span>
    </div>

    <div class="slide-inner">
        <div class="section-eyebrow reveal">YOU DECIDE</div>
        <h2 class="section-heading reveal">If you had to pick one &mdash; which fixes it?</h2>

        <div class="poll-grid">
            <button type="button" class="poll-option orange reveal" data-option="redesign" aria-label="Vote redesign">
                <div class="poll-marker">A</div>
                <div class="poll-title">REDESIGN</div>
                <div class="poll-sub">Fix the tool</div>
                <div class="poll-bar"><div class="poll-bar-fill" data-for="redesign"></div></div>
                <div class="poll-count"><span data-count="redesign">0</span> votes &middot; <span data-pct="redesign">0%</span></div>
            </button>
            <button type="button" class="poll-option yellow reveal" data-option="retrain" aria-label="Vote retrain">
                <div class="poll-marker">B</div>
                <div class="poll-title">RETRAIN</div>
                <div class="poll-sub">Fix the hands</div>
                <div class="poll-bar"><div class="poll-bar-fill" data-for="retrain"></div></div>
                <div class="poll-count"><span data-count="retrain">0</span> votes &middot; <span data-pct="retrain">0%</span></div>
            </button>
        </div>

        <div class="poll-meta reveal">
            <span id="pollStatus">Tap a card to vote</span> &middot; live results every 2s
        </div>
    </div>
</section>
